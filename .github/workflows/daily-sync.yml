name: Daily Job Board Sync

on:
  schedule:
    # 3 AM EST = 8 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual triggers

concurrency:
  group: jobboard-daily-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # Required for git push in "Commit run history" step

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ae-job-board/package-lock.json

      - name: Install dependencies
        working-directory: ae-job-board
        run: npm ci

      - name: Run pipeline
        working-directory: ae-job-board
        env:
          PDL_API_KEY: ${{ secrets.PDL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEBFLOW_COLLECTION_ID: ${{ secrets.WEBFLOW_COLLECTION_ID }}
          WEBFLOW_SITE_ID: ${{ secrets.WEBFLOW_SITE_ID }}
          AI_CONCURRENCY: "2"
          ANTHROPIC_REQUESTS_PER_MINUTE: "45"
          ATS_PROVIDERS: greenhouse,lever,ashby,workable,smartrecruiters,breezy,zoho,jobscore,workday,paylocity,ultipro,freshteam,jobvite,trinethire
        run: npx tsx src/index.ts

      - name: Commit run history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ae-job-board/data/run-history.json || true
          if ! git diff --cached --quiet; then
            git commit -m "Update run history [skip ci]"
            git push
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-logs
          path: ae-job-board/logs/
          retention-days: 14
