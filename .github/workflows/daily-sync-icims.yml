name: Daily Job Board Sync (iCIMS)

on:
  schedule:
    # 4:30 AM EST = 9:30 AM UTC
    - cron: '30 9 * * *'
  workflow_dispatch: # Allow manual triggers

concurrency:
  group: jobboard-daily-sync
  cancel-in-progress: false

jobs:
  sync-icims:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write  # Required for git push in "Commit run history" step

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ae-job-board/package-lock.json

      - name: Install dependencies
        working-directory: ae-job-board
        run: npm ci

      - name: Run iCIMS pipeline
        working-directory: ae-job-board
        env:
          PDL_API_KEY: ${{ secrets.PDL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEBFLOW_COLLECTION_ID: ${{ secrets.WEBFLOW_COLLECTION_ID }}
          WEBFLOW_SITE_ID: ${{ secrets.WEBFLOW_SITE_ID }}
          AI_CONCURRENCY: "2"
          ANTHROPIC_REQUESTS_PER_MINUTE: "45"
          ATS_PROVIDERS: icims
        run: npx tsx src/index.ts

      - name: Commit run history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ae-job-board/data/run-history.json || true
          if ! git diff --cached --quiet; then
            git commit -m "Update run history (iCIMS) [skip ci]"
            git push
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-logs-icims
          path: ae-job-board/logs/
          retention-days: 14
